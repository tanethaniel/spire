<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#B0E5D7">
  <title>Spire — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #d4ede4 0%, #e8e4d8 50%, #d4ede4 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1A2026;
    }
    .card {
      max-width: 340px;
      width: 100%;
      text-align: center;
      padding: 32px 24px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .wordmark {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }
    .wordmark span { color: #6BBFA8; }
    .icon {
      font-size: 36px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .body {
      font-size: 14px;
      color: #6B7580;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      width: 100%;
      padding: 14px 0;
      background: #6BBFA8;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="wordmark">spire<span>.</span></div>
    <div class="icon">&#x1F4F6;</div>
    <div class="title">You're offline</div>
    <div class="body">Your data is safe. Reconnect to the internet and tap below to continue.</div>
    <button class="btn" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
